services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./backend/credentials:/app/credentials:ro
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite+aiosqlite:////app/data/leadhunter.db
      LEADHUNTER_DATA_DIR: /app/data

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api
